name: Performance Intelligence Engine Audit

on:
  push:
    branches:
      - main
  schedule:
    # Run automatically every day at 12:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  audit_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Performance Audit
        run: npm run audit
        env:
          # Optional: Add your PageSpeed/WebPageTest API Keys here in GitHub Secrets
          # PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Upload PDF Report as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: performance-audit-report
          path: reports/performance-audit.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: './public'

  deploy:
    needs: audit_and_deploy
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
