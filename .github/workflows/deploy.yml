name: Performance Intelligence Engine Audit

on:
  push:
    branches:
      - main
  schedule:
    # Run automatically every day at 12:00 AM UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  audit_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm ci

      - name: Run Performance Audit
        run: npm run audit
        env:
          # Optional: Add your PageSpeed/WebPageTest API Keys here in GitHub Secrets
          # PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: "true"
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Upload PDF Report as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: performance-audit-report
          path: reports/performance-audit.pdf

      - name: Deploy Dashboard to Cloudflare Pages
        uses: cloudflare/pages-action@1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'performance-intelligence-engine'
          directory: 'public'
          githubToken: ${{ secrets.GITHUB_TOKEN }}
